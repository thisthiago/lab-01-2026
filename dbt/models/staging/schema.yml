version: 2

sources:
  - name: airbyte_raw
    description: "Dados brutos carregados pelo Airbyte do MongoDB"
    schema: stg
    tables:
      - name: orders
        description: "Pedidos extraídos da coleção orders do MongoDB"
        columns:
          - name: _airbyte_unique_key
            description: "Chave única gerada pelo Airbyte"
          - name: order_id
            description: "ID do pedido (tipado pelo Airbyte V2)"
          - name: customer_id
            description: "ID do cliente (tipado pelo Airbyte V2)"
          - name: _airbyte_emitted_at
            description: "Timestamp de extração pelo Airbyte"

      - name: customers
        description: "Clientes extraídos da coleção customers do MongoDB"
        columns:
          - name: _airbyte_unique_key
            description: "Chave única gerada pelo Airbyte"
          - name: customer_id
            description: "ID do cliente (tipado pelo Airbyte V2)"
          - name: email
            description: "Email do cliente (tipado pelo Airbyte V2)"
          - name: _airbyte_emitted_at
            description: "Timestamp de extração pelo Airbyte"

models:
  - name: stg_orders
    description: "Staging de pedidos — dados limpos e padronizados do MongoDB"
    columns:
      - name: order_id
        description: "ID único do pedido"
        tests:
          - not_null
          - unique

      - name: customer_id
        description: "ID do cliente"
        tests:
          - not_null

      - name: order_status
        description: "Status do pedido"
        tests:
          - accepted_values:
              values: ['pending', 'processing', 'completed', 'cancelled', 'refunded']

      - name: total_amount
        description: "Valor total do pedido"
        tests:
          - not_null

  - name: stg_customers
    description: "Staging de clientes — dados limpos e padronizados do MongoDB"
    columns:
      - name: customer_id
        description: "ID único do cliente"
        tests:
          - not_null
          - unique

      - name: customer_email
        description: "Email do cliente"
        tests:
          - not_null
